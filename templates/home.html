{% extends 'base.html' %}
{% block title %}flavor - Discover Restaurants{% endblock %}
{% block content %}
<!-- HERO -->
<div class="hero">
<div class="hero-label">Your Restaurant Guide</div>
<h1>YER<br><span>Routes</span></h1>

</form>
</div>
{% endblock %}
